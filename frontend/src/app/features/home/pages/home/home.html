<section class="min-h-[calc(100vh-6rem)] flex items-center justify-center px-4">
  <div class="w-full max-w-xl rounded-3xl border border-surface-border bg-surface p-8 shadow-sm">
    <div class="flex flex-col gap-2 mb-8">
      <p class="text-sm text-on-surface-variant">Bienvenido a Post App</p>
      <h1 class="text-on-surface">Inicia con tu perfil</h1>
      <p class="text-on-surface-variant">Completa tu perfil para empezar a publicar posts</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-5">
      <app-input
        id="home-name"
        label="Nombre"
        placeholder="Tu nombre"
        formControlName="name"
        [error]="!!getError('name')"
        [errorText]="getError('name')"
        appAutoFocus
      />
      <app-input
        id="home-email"
        label="Email"
        type="email"
        placeholder="correo@ejemplo.com"
        formControlName="email"
        [error]="!!getError('email')"
        [errorText]="getError('email')"
      />
      <app-button
        variant="primary"
        size="lg"
        text="Iniciar"
        type="submit"
        [disabled]="!isFormValid()"
        [fullWidth]="true"
      />
    </form>
  </div>
</section>
