@if (visible()) {
  <div
    class="pointer-events-auto fixed inset-0 flex items-center justify-center bg-black/10 backdrop-blur-md p-6 modal-overlay"
    [class.modal-overlay--closing]="closing()"
    (click)="onBackdropClick()"
    (keydown.escape)="onEscape()"
    tabindex="-1"
  >
    <div
      class="w-full max-w-xl rounded-2xl border border-surface-border bg-surface p-7 shadow-[0_30px_60px_-35px_rgba(15,23,42,0.6)] modal-card"
      [class.modal-card--closing]="closing()"
      (click)="$event.stopPropagation()"
    >
      <div class="flex items-center justify-between gap-4">
        @if (title()) {
          <h3 class="text-lg font-semibold text-on-surface">{{ title() }}</h3>
        }
        @if (showClose()) {
          <button
            type="button"
            class="size-10 flex justify-center items-center rounded-full border border-transparent text-on-surface-variant transition-colors hover:border-surface-border hover:text-on-surface"
            (click)="requestClose()"
          >
            <span class="iconify icon-[lucide--x] text-xl"></span>
          </button>
        }
      </div>
      @if (description()) {
        <p class="mt-3 text-sm text-on-surface-variant leading-relaxed">{{ description() }}</p>
      }
      <ng-content></ng-content>
    </div>
  </div>
}
