<div class="max-w-md text-center">
  <span [class]="'mx-auto block size-20 text-on-surface-variant ' + icon()"></span>
  <h2 class="mt-6 text-2xl font-bold text-on-surface">{{ title() }}</h2>

  @if (description()) {
    <p class="mt-4 text-pretty text-on-surface-variant">
      {{ description() }}
    </p>
  }

  @if (actionText()) {
    <app-button
      class="mt-6 w-full"
      [variant]="actionVariant()"
      [text]="actionText()"
      [fullWidth]="true"
      (onClick)="onAction()"
    />
  }

  <ng-content></ng-content>
</div>
