<header class="fixed top-0 w-full z-40 bg-surface-container-lowest border-b border-surface-border flex justify-end items-center h-16 px-6">
  <div class="flex items-center gap-4">
    @if (buttonText) {
      <app-button
        [variant]="'primary'"
        [text]="buttonText"
        [icon]="buttonIcon"
        (onClick)="onCreateClick()"
      />
    }
  </div>
</header>
