services:
  api:
    build: ./backend
    container_name: posts-api
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: mongodb://mongo:27017/prueba-albatros
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: posts-frontend
    ports:
      - '8080:80'
    depends_on:
      - api
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: posts-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
